<!-- PP:SECTION:hero -->
<section class="hero hero--{{backgroundStyle}}" data-pp-section="hero">
  <div class="hero__inner">
    <div class="hero__content">
      <h1 class="hero__title">{{heading}}</h1>
      <p class="hero__subtitle">{{subheading}}</p>
      <div class="hero__actions">
        <a class="hero__cta" href="{{ctaHref}}">{{ctaText}}</a>
      </div>
    </div>
    <div class="hero__card" aria-hidden="true"></div>
  </div>
</section>
<!-- /PP:SECTION:hero -->
