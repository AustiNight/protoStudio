<!-- PP:SECTION:calendar-embed -->
<section class="calendar-embed" data-pp-section="calendar-embed">
  <div class="calendar-embed__inner">
    <header class="calendar-embed__header">
      <h2 class="calendar-embed__title">{{heading}}</h2>
      <p class="calendar-embed__subtitle">{{subheading}}</p>
    </header>
    <div class="calendar-embed__frame">
      <iframe
        src="{{calendarUrl}}"
        title="{{calendarTitle}}"
        loading="lazy"
        allow="camera; microphone"
      ></iframe>
    </div>
    <p class="calendar-embed__note">{{note}}</p>
  </div>
</section>
<!-- /PP:SECTION:calendar-embed -->
