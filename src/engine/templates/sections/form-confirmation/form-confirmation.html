<!-- PP:SECTION:form-confirmation -->
<section class="form-confirmation" data-pp-section="form-confirmation">
  <div class="form-confirmation__inner">
    <div class="form-confirmation__badge">{{badge}}</div>
    <h2 class="form-confirmation__title">{{heading}}</h2>
    <p class="form-confirmation__message">{{message}}</p>
    <a class="form-confirmation__cta" href="{{ctaHref}}">{{ctaText}}</a>
    <div class="form-confirmation__details">
      <div class="form-confirmation__detail">
        <span class="form-confirmation__detail-label">Response time</span>
        <span class="form-confirmation__detail-value">{{responseTime}}</span>
      </div>
      <div class="form-confirmation__detail">
        <span class="form-confirmation__detail-label">Email</span>
        <span class="form-confirmation__detail-value">{{email}}</span>
      </div>
    </div>
  </div>
</section>
<!-- /PP:SECTION:form-confirmation -->
