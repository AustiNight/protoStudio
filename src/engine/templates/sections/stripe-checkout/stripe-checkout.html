<!-- PP:SECTION:stripe-checkout -->
<section class="stripe-checkout" data-pp-section="stripe-checkout">
  <div class="stripe-checkout__inner">
    <header class="stripe-checkout__header">
      <h2 class="stripe-checkout__title">{{heading}}</h2>
      <p class="stripe-checkout__subtitle">{{subheading}}</p>
    </header>
    <div class="stripe-checkout__card">
      <p class="stripe-checkout__summary">{{summary}}</p>
      <a class="stripe-checkout__button" href="{{stripePaymentLink}}" data-stripe-link>
        {{ctaText}}
      </a>
      <p class="stripe-checkout__note">{{note}}</p>
    </div>
  </div>
</section>
<!-- /PP:SECTION:stripe-checkout -->
