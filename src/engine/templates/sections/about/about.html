<!-- PP:SECTION:about -->
<section class="about about--{{layout}}" data-pp-section="about">
  <div class="about__inner">
    <figure class="about__media">
      <img
        class="about__image"
        src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=900&q=80"
        alt="{{imageAlt}}"
      />
    </figure>
    <div class="about__content">
      <h2 class="about__title">{{heading}}</h2>
      <div class="about__body">{{body}}</div>
    </div>
  </div>
</section>
<!-- /PP:SECTION:about -->
