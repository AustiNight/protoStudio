name: guardrails-lint

on:
  pull_request:
  push:

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Guardrail lint
        run: node scripts/guardrails-lint.js
