name: pricing-calibration

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  pricing-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
      - name: Verify pricing freshness and OpenAI source reachability
        run: npm run pricing:check
