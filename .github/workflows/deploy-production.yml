name: deploy-production

on:
  push:
    tags:
      - v0.0.*
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check tag commit is on main
        id: tag
        run: |
          echo "Tag ref: ${GITHUB_REF_NAME:-unknown}"
          git fetch origin main --force
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag commit is on main."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag commit is not on main; skipping deploy."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Skip deploy (not on main)
        if: steps.tag.outputs.should_deploy != 'true'
        run: echo "Skipping Cloudflare production deploy; tag commit is not on main."
      - name: Setup Node
        if: steps.tag.outputs.should_deploy == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install
        if: steps.tag.outputs.should_deploy == 'true'
        run: npm ci
      - name: Build
        if: steps.tag.outputs.should_deploy == 'true'
        run: npm run build
      - name: Check Cloudflare secrets
        if: steps.tag.outputs.should_deploy == 'true'
        id: cf
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
        run: |
          missing=0
          if [ -z "$CF_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN missing"
            missing=1
          fi
          if [ -z "$CF_ACCOUNT_ID" ]; then
            echo "CLOUDFLARE_ACCOUNT_ID missing"
            missing=1
          fi
          if [ -z "$CF_PROJECT_NAME" ]; then
            echo "CLOUDFLARE_PROJECT_NAME missing"
            missing=1
          fi
          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Skip deploy (missing secrets)
        if: steps.tag.outputs.should_deploy == 'true' && steps.cf.outputs.ready != 'true'
        run: echo "Skipping Cloudflare production deploy; required secrets not set."
      - name: Deploy production to Cloudflare Pages
        if: steps.tag.outputs.should_deploy == 'true' && steps.cf.outputs.ready == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
