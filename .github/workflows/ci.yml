name: ci

on:
  pull_request:
  push:

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - name: Set change control refs
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "CHANGE_CONTROL_BASE=${{ github.event.pull_request.base.sha }}" >> $GITHUB_ENV
          else
            echo "CHANGE_CONTROL_BASE=${{ github.event.before }}" >> $GITHUB_ENV
          fi
          echo "CHANGE_CONTROL_HEAD=${{ github.sha }}" >> $GITHUB_ENV
      - name: Change control checks
        run: node scripts/change-control.js
      - name: Guardrail lint checks
        run: node scripts/guardrails-lint.js
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test:unit -- --passWithNoTests
      - name: Integration tests
        run: npm run test:integration -- --passWithNoTests
      - name: Imagery regression tests
        run: npm run test:imagery -- --passWithNoTests
      - name: Build
        run: npm run build
      - name: Bundle size gate
        run: |
          if [ ! -d dist/assets ]; then
            echo "dist/assets missing"
            exit 1
          fi
          node <<'NODE'
          const { gzipSync } = require('node:zlib');
          const { readdirSync, readFileSync, statSync } = require('node:fs');
          const { join } = require('node:path');

          const assetsDir = join(process.cwd(), 'dist', 'assets');
          const files = readdirSync(assetsDir)
            .filter((file) => /\.(css|js)$/.test(file))
            .map((file) => join(assetsDir, file))
            .filter((file) => statSync(file).isFile());

          if (files.length === 0) {
            console.error('No JS/CSS assets found in dist/assets.');
            process.exit(1);
          }

          const gzipBytes = files.reduce(
            (total, file) => total + gzipSync(readFileSync(file)).length,
            0,
          );
          const gzipKb = Math.ceil(gzipBytes / 1024);
          const maxKb = 256;

          console.log(`gzipped app bundle: ${gzipKb} KB`);

          if (gzipKb > maxKb) {
            console.error(`Gzipped app bundle ${gzipKb}KB exceeds ${maxKb}KB`);
            process.exit(1);
          }
          NODE
