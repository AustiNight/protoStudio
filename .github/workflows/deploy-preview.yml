name: deploy-preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Check Cloudflare secrets
        id: cf
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
        run: |
          missing=0
          if [ -z "$CF_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN missing"
            missing=1
          fi
          if [ -z "$CF_ACCOUNT_ID" ]; then
            echo "CLOUDFLARE_ACCOUNT_ID missing"
            missing=1
          fi
          if [ -z "$CF_PROJECT_NAME" ]; then
            echo "CLOUDFLARE_PROJECT_NAME missing"
            missing=1
          fi
          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Skip deploy (missing secrets)
        if: steps.cf.outputs.ready != 'true'
        run: echo "Skipping Cloudflare preview deploy; required secrets not set."
      - name: Deploy preview to Cloudflare Pages
        if: steps.cf.outputs.ready == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: preview-pr-${{ github.event.pull_request.number }}
